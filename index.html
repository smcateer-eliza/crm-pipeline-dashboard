<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRM Pipeline Dashboard</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Pipeline Pulse CRM</p>
        <h1>CRM Pipeline Dashboard</h1>
      </div>
      <div class="header-controls">
        <nav class="view-tabs" aria-label="Dashboard views" role="tablist">
          <button class="view-tab is-active" type="button" role="tab" data-view="pipeline" aria-selected="true">Pipeline</button>
          <button class="view-tab" type="button" role="tab" data-view="risk" aria-selected="false">Risk</button>
        </nav>
        <div class="header-actions">
          <label for="owner-filter">Owner</label>
          <select id="owner-filter">
            <option value="all">All owners</option>
          </select>
        </div>
      </div>
    </header>

    <main>
      <section class="metrics" aria-label="Pipeline metrics">
        <article>
          <span id="metric-open">$0</span>
          <p>Open pipeline</p>
        </article>
        <article>
          <span id="metric-weighted">$0</span>
          <p>Weighted pipeline</p>
        </article>
        <article>
          <span id="metric-critical">0</span>
          <p>Critical deals</p>
        </article>
        <article>
          <span id="metric-overdue">0</span>
          <p>Overdue tasks</p>
        </article>
      </section>

      <section id="pipeline-view" class="view-section" data-view-panel="pipeline">
        <section class="layout">
          <aside class="account-panel">
            <h2>Account Health</h2>
            <div id="account-list" class="account-list"></div>
          </aside>

          <section class="pipeline-panel">
            <div class="panel-heading">
              <h2>Open Opportunities</h2>
              <p id="result-count">0 deals</p>
            </div>
            <div id="opportunity-list" class="opportunity-list"></div>
          </section>
        </section>
      </section>

      <section id="risk-view" class="view-section" data-view-panel="risk" hidden>
        <section class="risk-grid" aria-label="Risk matrix dashboard">
          <article class="risk-matrix-panel">
            <div class="panel-heading">
              <div>
                <h2>Deal Risk Matrix</h2>
                <p>Risk score by open deal amount</p>
              </div>
            </div>
            <div id="risk-legend" class="risk-legend" aria-label="Risk matrix legend"></div>
            <div id="risk-matrix" class="risk-matrix"></div>
          </article>

          <aside id="risk-detail" class="risk-detail-panel" aria-label="Selected deal details"></aside>
        </section>

        <section class="risk-support-grid" aria-label="Risk supporting summaries">
          <article class="summary-panel">
            <div class="panel-heading">
              <h2>Forecast Exposure</h2>
            </div>
            <div id="forecast-breakdown" class="forecast-breakdown"></div>
          </article>

          <article class="summary-panel">
            <div class="panel-heading">
              <h2 id="owner-summary-title">Owner Risk Summary</h2>
            </div>
            <div id="owner-risk-summary" class="owner-risk-summary"></div>
          </article>
        </section>

        <section class="risk-deal-list-panel" aria-label="Selectable risk deals">
          <div class="panel-heading">
            <h2>Deals in View</h2>
            <p id="risk-result-count">0 deals</p>
          </div>
          <div id="risk-deal-list" class="risk-deal-list"></div>
        </section>
      </section>
    </main>

    <script type="module" src="src/main.js?v=risk-dashboard"></script>
  </body>
</html>
